<!DOCTYPE html>
<html>
<head>
    <title>Edit Class</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 40px;
        }
        .form-box {
            background: white;
            padding: 25px;
            border-radius: 8px;
            width: 400px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0 15px 0;
        }
        button {
            padding: 10px 18px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        a {
            text-decoration: none;
            color: #333;
        }
    </style>
</head>
<body>

<div class="form-box">
    <h2>Edit Class Details</h2>

    {% if class_data %}
    <form method="POST">
        <label>Class Name:</label>
        <input type="text" name="name" value="{{ class_data[1] }}" required>

        <label>Periods Per Day:</label>
        <input type="number" name="periods_per_day" value="{{ class_data[2] }}" required>

        <label>Working Days:</label>
        <input type="number" name="working_days" value="{{ class_data[3] }}" required>

        <label>Start Time:</label>
        <input type="text" name="start_time" value="{{ class_data[4] }}">

        <label>Break After Period:</label>
        <input type="number" name="break_after" value="{{ class_data[5] }}" required>

        <button type="submit">Update Class</button>
    </form>
    {% else %}
        <h3 style="color:red;">Class data not found!</h3>
    {% endif %}

    <br>
    <a href="/manage_data">← Back to Manage Data</a>
</div>

</body>
</html>
